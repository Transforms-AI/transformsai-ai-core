server {
    listen 80;

    location /demand/ {
        root /usr/share/nginx/html;
        default_type text/plain;
        add_header Cache-Control "no-store";    # never cache the flag
        # Optional hardening: allow only edge egress IPs, or require a
        # shared-secret header, e.g.:
        #   if ($http_x_demand_key != "your-shared-secret") { return 403; }
    }

    location / {
        return 404;
    }
}
