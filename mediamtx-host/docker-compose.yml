# MediaMTX host stack for TransformsAI edge streaming.
#
# Replaces the old `sudo docker run ... bluenviron/mediamtx:1` command.
# Run from this directory:  docker compose up -d
#
# Services:
#   mediamtx    — the streaming server (image with a shell, required for the
#                 runOnDemand/runOnUnDemand hooks in mediamtx.yml)
#   demand      — nginx:alpine serving the demand flags the edges poll
#   demand-init — clears stale flags on stack start (a leftover "on" flag
#                 from a previous run would make an edge push with no viewers)

services:
  mediamtx:
    # NOT the default 'latest'/'1' image — that one is FROM scratch with no
    # shell, so the runOnDemand hooks silently do nothing. The -ffmpeg
    # variant is Alpine-based and has sh.
    image: bluenviron/mediamtx:latest-ffmpeg
    container_name: mediamtx
    restart: unless-stopped
    environment:
      MTX_RTSPTRANSPORTS: tcp
      MTX_WEBRTCADDITIONALHOSTS: 161.97.126.245,mediamtx.transformsai.com
    ports:
      - "8554:8554"        # RTSP (edge publishes here)
      - "1935:1935"        # RTMP (currently disabled in mediamtx.yml)
      - "8888:8888"        # HLS  (currently disabled in mediamtx.yml)
      - "8889:8889"        # WebRTC HTTP / WHEP
      - "8890:8890/udp"    # SRT  (currently disabled in mediamtx.yml)
      - "8189:8189/udp"    # WebRTC ICE/UDP
      - "9997:9997"        # Control API
    volumes:
      - ./mediamtx.yml:/mediamtx.yml:ro
      - demand:/demand     # runOnDemand/runOnUnDemand write flags here
    mem_limit: 1g
    memswap_limit: 2g
    cpus: 2
    depends_on:
      demand-init:
        condition: service_completed_successfully

  demand-init:
    image: alpine:3
    command: sh -c 'rm -f /demand/*'
    volumes:
      - demand:/demand

  demand:
    image: nginx:alpine
    container_name: mediamtx-demand
    restart: unless-stopped
    # Bound to localhost only: the public nginx on the host proxies
    # https://<host>/demand/ to it (see README). Change to "8880:80" if you
    # need direct access without a reverse proxy.
    ports:
      - "127.0.0.1:8880:80"
    volumes:
      - demand:/usr/share/nginx/html/demand:ro
      - ./demand-nginx.conf:/etc/nginx/conf.d/default.conf:ro

volumes:
  demand:
